<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/result.css">
</head>
<body>
<header class="header">
    <div class="container">
        <div class="logo">
            <img src="images/logo.png" alt="logotip">
        </div>
    </div>
</header>

<section class="result">
    <div class="container">
        <div class="result-image">
            <img src="images/question-marks.png" alt="questions">
        </div>
        <div class="result-title big-title">
            Ура! Ты прошёл тест! <span>Твой результат</span>:
        </div>
        <div class="result-score">
            4/5
        </div>
        <div class="watch-right-answers">
            <a href="#" class="links" id="watch-right-answers">Посмотреть правильные ответы <img src="images/arrow-result.png" alt="arrow"></a>
        </div>
    </div>
</section>

<footer class="footer">«АйтилогияQuiz» © Все права защищены / 2022</footer>

<script src="scripts/common.js"></script>
<script src="scripts/results.js"></script>

</body>
</html>
